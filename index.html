<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario</title>

    <style>

           form{
            background-color: black;
            width: 30%;
            height: 400px;
            border: 2px solid red;
            padding: 20px;
            color: white;
        }

        /* Etiquetas */
        label{
            color: white;
            text-transform: uppercase;
            font-size: 14px;
        }

        /* Campos de texto */
        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="tel"]{
            background: transparent;
            border: none;
            border-bottom: 2px dashed gray;
            color: white;
            width: 100%;
            outline: none;
            
        }

        /* Hover */
        input[type="text"]:hover,
        input[type="email"]:hover,
        input[type="number"]:hover,
        input[type="tel"]:hover{
         border-bottom: 3px solid yellow;
        }

        /* Focus */
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        input[type="tel"]:focus{
            border-bottom: 3px solid #93b3a5;
        }

        /* Botón */
        input[type="submit"]{
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #1beae990;
            color: white;
            text-transform: uppercase;
            font-size: 15px;
            cursor: pointer;
            border: none;
        }

        /* Hover del botón */
        input[type="submit"]:hover{
            background-color: #1aea90;
        }

    </style>
</head>
<body>

    <form action="cuestionario">

        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required><br><br>

        <label for="age">Edad:</label>
        <input type="number" id="age" name="age" required><br><br>

        <label for="tele">Teléfono:</label>
        <input type="tel" id="tele" name="tele" required><br><br>

        <label for="Correo">Correo Electrónico:</label>
        <input type="email" id="Correo" name="Correo" required><br><br>

        <label for="Comentarios">Comentarios:</label>
        <input type="text" id="Comentarios" name="Comentarios"><br><br>

        <input type="submit" value="Enviar-Solicitud">
    
    </form>
</body>
</html>
